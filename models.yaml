models:
  - id: internvl3_38b
    name: "InternVL3-38B"
    # 【动态控制区】这两个参数可以随时被后端代码拦截、修改或覆盖
    tensor_parallel_size: 2
    pipeline_parallel_size: 3
    # 【核心配置区】标准的官方 vLLM 参数（对应 vllm serve 的标准配置项）
    vllm_config:
      model: "/Data_share/chongwen/.local/modelscope/InternVL3-38B"
      host: "0.0.0.0"
      port: 33261
      uvicorn-log-level: "info"
      api-key: "token-abc123"
      dtype: "bfloat16"
      trust-remote-code: true
      gpu_memory_utilization: 0.9
      max-model-len: 8192
      enable-log-requests: true

