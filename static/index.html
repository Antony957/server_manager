<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>服务器管理控制台</title>
<link id="theme-link" rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-page="vllm.html" onclick="switchTab(this)">vllm管理</div>
    <div class="tab" data-page="tasks.html" onclick="switchTab(this)">任务管理</div>
    <button id="theme-toggle" class="btn-log" style="margin-left:auto; align-self:center;" onclick="toggleTheme()">🌞 浅色</button>
  </div>
  <iframe id="content-frame" src="vllm.html"></iframe>

<script>
const THEME_KEY = 'console_theme';
const frame = document.getElementById('content-frame');
const toggleBtn = document.getElementById('theme-toggle');
const themeLink = document.getElementById('theme-link');

function getTheme() {
  return localStorage.getItem(THEME_KEY) || 'dark';
}

function applyTheme(theme) {
  localStorage.setItem(THEME_KEY, theme);
  toggleBtn.textContent = theme === 'dark' ? '🌞 浅色' : '🌙 深色';
  // 外壳页自身也切换主题样式
  themeLink.href = theme === 'light' ? 'style-light.css' : 'style.css';
  // 重新加载 iframe 并带上主题参数，保证子页面同步
  const base = frame.getAttribute('data-page') || 'vllm.html';
  frame.src = base + '?theme=' + theme;
}

function toggleTheme() {
  applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  frame.setAttribute('data-page', el.dataset.page);
  frame.src = el.dataset.page + '?theme=' + getTheme();
}

// 初始化：根据上次保存的主题加载
applyTheme(getTheme());
</script>
</body>
</html>
