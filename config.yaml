# 4台后端服务器配置
servers:
  - id: srv1
    name: "服务器1 (A100 x2)"
    host: "10.0.0.11"
    ssh_port: 22
    ssh_user: "ubuntu"
    ssh_key_path: "/home/claude/.ssh/id_rsa"   # 改成你的私钥路径,或留空用密码
    ssh_password: ""                            # 用密钥的话留空
    vllm_port: 8000                              # vLLM 在该服务器上监听的端口
    default_model: "/data/models/Qwen2.5-7B-Instruct"
    default_extra_args: "--gpu-memory-utilization 0.9 --max-model-len 8192"
    log_path: "/tmp/vllm.log"
    pid_path: "/tmp/vllm.pid"

  - id: srv2
    name: "服务器2 (A100 x2)"
    host: "10.0.0.12"
    ssh_port: 22
    ssh_user: "ubuntu"
    ssh_key_path: "/home/claude/.ssh/id_rsa"
    ssh_password: ""
    vllm_port: 8000
    default_model: "/data/models/Qwen2.5-7B-Instruct"
    default_extra_args: "--gpu-memory-utilization 0.9"
    log_path: "/tmp/vllm.log"
    pid_path: "/tmp/vllm.pid"

  - id: srv3
    name: "服务器3 (H100 x4)"
    host: "10.0.0.13"
    ssh_port: 22
    ssh_user: "ubuntu"
    ssh_key_path: "/home/claude/.ssh/id_rsa"
    ssh_password: ""
    vllm_port: 8000
    default_model: "/data/models/Qwen2.5-72B-Instruct"
    default_extra_args: "--tensor-parallel-size 4 --gpu-memory-utilization 0.9"
    log_path: "/tmp/vllm.log"
    pid_path: "/tmp/vllm.pid"

  - id: srv4
    name: "服务器4 (H100 x4)"
    host: "10.0.0.14"
    ssh_port: 22
    ssh_user: "ubuntu"
    ssh_key_path: "/home/claude/.ssh/id_rsa"
    ssh_password: ""
    vllm_port: 8000
    default_model: "/data/models/Llama-3.1-70B-Instruct"
    default_extra_args: "--tensor-parallel-size 4"
    log_path: "/tmp/vllm.log"
    pid_path: "/tmp/vllm.pid"

# 本机控制台监听端口
console_port: 9000
